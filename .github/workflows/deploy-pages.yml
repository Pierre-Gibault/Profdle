name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Ensure professors.json is in export
        run: |
          mkdir -p out
          cp -a public/. out/
          ls -la out
          ls -la out/images || true

      - name: Verify export folder
        run: |
          if [ ! -d out ]; then
            echo "Missing ./out. Configure Next.js static export (output: 'export') or run next export."
            exit 1
          fi
          if [ ! -f out/professors.json ]; then
            echo "Missing out/professors.json"
            exit 1
          fi
          ls -la out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4